<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Medicine - MEDITRACKER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>

  <style>
    body {
      --accent-color: #007bff;
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
      color: #343a40;
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }
    .container { max-width: 800px; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
    .header h1 { font-size: 2.25rem; font-weight: 700; color: #212529; margin: 0; }
    .header-buttons { display: flex; align-items: center; gap: 0.75rem; }
    .back-btn { border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: background-color 0.2s ease; background-color: #6c757d; color: white; }
    .back-btn:hover { background-color: #5a6268; }
    .form-card { background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06); padding: 2rem 2.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 500; color: #495057; margin-bottom: 0.5rem; }
    input[type="text"], input[type="time"], input[type="date"] { width: 100%; padding: 0.75rem 1rem; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; font-family: 'Inter', sans-serif; box-sizing: border-box; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 0.2rem color-mix(in srgb, var(--accent-color) 25%, transparent); }
    .options-group { display: flex; flex-wrap: wrap; gap: 1rem; }
    .options-group label { display: flex; align-items: center; gap: 0.5rem; font-weight: 400; }
    .duration-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .primary-btn { width: 100%; padding: 0.8rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; color: #fff; background-color: var(--accent-color); cursor: pointer; transition: filter 0.2s ease; margin-top: 1rem; }
    .primary-btn:hover { filter: brightness(90%); }
    body.dark-mode { background-color: #121212; color: #e0e0e0; }
    body.dark-mode .header h1 { color: #ffffff; }
    body.dark-mode .back-btn { background-color: #495057; }
    body.dark-mode .back-btn:hover { background-color: #5a6268; }
    body.dark-mode .form-card { background-color: #1e1e1e; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
    body.dark-mode .form-group label { color: #adb5bd; }
    body.dark-mode input[type="text"], body.dark-mode input[type="time"], body.dark-mode input[type="date"] { background-color: #2c2c2c; border-color: #444; color: #e0e0e0; }
    body.dark-mode input:focus { border-color: var(--accent-color); }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 data-i18n-key="addMedTitle">Add New Medicine</h1>
      <div class="header-buttons">
          <a href="main.html" class="back-btn" data-i18n-key="dashboardButton">Dashboard</a>
      </div>
    </header>

    <div class="form-card">
      <form id="medicineForm">
        <div class="form-group">
          <label for="medicineName" data-i18n-key="medNameLabel">Medicine Name</label>
          <input type="text" id="medicineName" placeholder="e.g., Paracetamol" required />
        </div>
        
        <div class="form-group">
          <label data-i18n-key="dayCycleLabel">Day Cycle</label>
          <div class="options-group">
            <label><input type="checkbox" name="daycycle" value="Morning"> <span data-i18n-key="morning">Morning</span></label>
            <label><input type="checkbox" name="daycycle" value="Afternoon"> <span data-i18n-key="afternoon">Afternoon</span></label>
            <label><input type="checkbox" name="daycycle" value="Evening"> <span data-i18n-key="evening">Evening</span></label>
            <label><input type="checkbox" name="daycycle" value="Night"> <span data-i18n-key="night">Night</span></label>
          </div>
        </div>
        
        <div class="form-group">
          <label data-i18n-key="foodRefLabel">Food Reference</label>
          <div class="options-group">
            <label><input type="radio" name="food" value="Before Food" checked> <span data-i18n-key="beforeFood">Before Food</span></label>
            <label><input type="radio" name="food" value="After Food"> <span data-i18n-key="afterFood">After Food</span></label>
          </div>
        </div>
        
        <div class="form-group">
          <label for="reminderTime" data-i18n-key="reminderTimeLabel">Reminder Time</label>
          <input type="time" id="reminderTime" required />
        </div>
        
        <div class="form-group">
          <label data-i18n-key="durationLabel">Duration of Medicine</label>
          <div class="duration-group">
            <div>
              <label for="startDate" data-i18n-key="startDateLabel">Start Date</label>
              <input type="date" id="startDate" required/>
            </div>
            <div>
              <label for="endDate" data-i18n-key="endDateLabel">End Date</label>
              <input type="date" id="endDate" required/>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="expiryDate" data-i18n-key="expiryDateLabel">Expiry Date</label>
          <input type="date" id="expiryDate" required />
        </div>
        
        <button type="submit" class="primary-btn" data-i18n-key="addMedButton">Add Medicine</button>
      </form>
    </div>
  </div>

  <script src="js/add-medicine.js"></script>

  <script>
    (function() {
      if (localStorage.getItem("mode") === "dark") { document.body.classList.add("dark-mode"); }
      const settings = JSON.parse(localStorage.getItem("meditracker_settings") || '{}');
      const lang = settings.language || 'en';
      applyLanguage(lang);
      const accentColorName = settings.accentColor || 'blue';
      let colorCode = '#007bff';
      if (accentColorName === 'green') colorCode = '#198754';
      if (accentColorName === 'purple') colorCode = '#6f42c1';
      document.body.style.setProperty('--accent-color', colorCode);
      window.addEventListener("storage", function(event) {
        if (event.key === "mode") { document.body.classList.toggle("dark-mode", event.newValue === "dark"); }
      });
    })();
  </script>
</body>
</html>
